<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0818">
  <title>游戏激活</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: linear-gradient(135deg, #0a0818 0%, #1a1535 50%, #0d1b2a 100%); min-height: 100vh; color: #e0e0e0; display: flex; justify-content: center; align-items: center; padding: 16px; }
    .container { width: 100%; max-width: 420px; }
    .header { text-align: center; margin-bottom: 28px; }
    .header h1 { font-size: 24px; color: #00e5ff; text-shadow: 0 0 20px rgba(0,229,255,0.3); }
    .header p { font-size: 13px; color: #69f0ae; margin-top: 6px; }
    .card { background: rgba(255,255,255,0.06); border-radius: 16px; padding: 28px 24px; border: 1px solid rgba(0,229,255,0.2); }
    .input-group { margin-bottom: 20px; }
    .label { font-size: 14px; color: #69f0ae; margin-bottom: 8px; font-weight: bold; }
    .input { width: 100%; padding: 14px; border-radius: 10px; font-size: 18px; font-family: monospace; border: 2px solid rgba(0,229,255,0.3); background: rgba(0,0,0,0.3); color: #fff; letter-spacing: 2px; text-align: center; }
    .input:focus { outline: none; border-color: #00e5ff; }
    .input::placeholder { color: #4a5a7a; letter-spacing: 1px; font-size: 14px; }
    .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; background: #00e5ff; color: #000; transition: all 0.2s; }
    .btn:active { transform: scale(0.98); opacity: 0.9; }
    .btn:disabled { opacity: 0.5; }
    .result { margin-top: 20px; padding: 20px; border-radius: 12px; text-align: center; display: none; }
    .result.show { display: block; }
    .result.success { background: rgba(105,240,174,0.1); border: 1px solid rgba(105,240,174,0.3); }
    .result.error { background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.3); }
    .result-label { font-size: 13px; margin-bottom: 8px; }
    .result.success .result-label { color: #69f0ae; }
    .result.error .result-label { color: #ff5252; }
    .result-code { font-size: 36px; color: #fff; font-weight: bold; font-family: monospace; letter-spacing: 6px; }
    .result-msg { font-size: 13px; color: #ccc; margin-top: 8px; }
    .copy-btn { margin-top: 12px; padding: 8px 20px; border-radius: 8px; border: 1px solid #00e5ff; background: rgba(0,229,255,0.15); color: #00e5ff; font-size: 13px; font-weight: bold; cursor: pointer; }
    .steps { margin-top: 24px; font-size: 12px; color: #5a6a8a; line-height: 2; }
    .loading-spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>游戏激活</h1>
      <p>输入设备码和卡密获取激活码</p>
    </div>
    <div class="card">
      <div class="input-group">
        <div class="label">设备码（手环上显示的8位数字）</div>
        <input type="text" class="input" id="deviceCode" placeholder="输入设备码" maxlength="8" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      </div>
      <div class="input-group">
        <div class="label">卡密</div>
        <input type="text" class="input" id="cardKey" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19" oninput="this.value=this.value.toUpperCase()">
      </div>
      <button class="btn" id="submitBtn" onclick="doActivate()">获取激活码</button>
      <div class="result" id="result"></div>
    </div>
    <div class="steps">
      <p>1. 在手环上打开游戏，查看8位设备码</p>
      <p>2. 输入设备码和卡密，点击获取激活码</p>
      <p>3. 将获得的激活码输入到手环中完成激活</p>
    </div>
  </div>

    // GitHub配置（混淆）
    var _g = { o: 'fukbcxg', r: 'shifande', b: 'main' };

      var file = await resp.json();
      var content = JSON.parse(decodeURIComponent(escape(atob(file.content))));

    // 更新keys.json（标记卡密已使用）

      var content = btoa(unescape(encodeURIComponent(JSON.stringify({ keys: keys }, null, 2))));

        method: 'PUT', headers: ghHeaders(),
        body: JSON.stringify({ message: 'mark key used', content: content, sha: file.sha, branch: 'main' })
      });
    }

    // 写入激活记录到records.json
    async function addRecord(record) {
      var resp = await fetch(API_URL + 'records.json', { headers: ghHeaders() });
      var file = await resp.json();
      var existing = JSON.parse(decodeURIComponent(escape(atob(file.content))));
      existing.records.push(record);
      var content = btoa(unescape(encodeURIComponent(JSON.stringify(existing, null, 2))));
      await fetch(API_URL + 'records.json', {
        method: 'PUT', headers: ghHeaders(),
        body: JSON.stringify({ message: 'add activation record', content: content, sha: file.sha, branch: 'main' })
      });
    }

    async function doActivate() {
      var deviceCode = document.getElementById('deviceCode').value.trim();
      var cardKey = document.getElementById('cardKey').value.trim().toUpperCase().replace(/\s/g, '');
      var btn = document.getElementById('submitBtn');
      var result = document.getElementById('result');

      if (!deviceCode || deviceCode.length !== 8) { showResult('error', '请输入8位设备码'); return; }
      if (!cardKey) { showResult('error', '请输入卡密'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spin"></span>正在验证...';

      try {
        // 1. 从GitHub获取最新卡密列表
        var keys = await fetchKeys();

        // 2. 验证卡密
        var keyData = keys.find(function(k) { return k.key === cardKey; });
        if (!keyData) { showResult('error', '卡密无效'); btn.disabled = false; btn.textContent = '获取激活码'; return; }
        if (keyData.used) { showResult('error', '此卡密已被使用'); btn.disabled = false; btn.textContent = '获取激活码'; return; }

        // 3. 生成激活码
        var activationCode = generateActivationCode(deviceCode);

        // 4. 标记卡密已使用
        keyData.used = true;
        keyData.usedAt = new Date().toISOString();
        keyData.deviceCode = deviceCode;
        await updateKeys(keys);

        // 5. 写入激活记录
        await addRecord({
          deviceCode: deviceCode,
          cardKey: cardKey,
          activationCode: activationCode,
          time: new Date().toISOString()
        });

        showResult('success', '激活成功！', activationCode, '请将激活码输入到手环中');
      } catch (e) {
        showResult('error', '网络错误，请稍后重试');
      }

      btn.disabled = false;
      btn.textContent = '获取激活码';
    }

    function showResult(type, label, code, msg) {
      var result = document.getElementById('result');
      result.className = 'result show ' + type;
      if (type === 'success') {
        result.innerHTML = '<div class="result-label">' + label + '</div><div class="result-code">' + code + '</div><div class="result-msg">' + (msg || '') + '</div><button class="copy-btn" onclick="copyCode(\'' + code + '\')">复制激活码</button>';
      } else {
        result.innerHTML = '<div class="result-label">' + label + '</div>';
      }
    }

    function copyCode(code) {
      if (navigator.clipboard) { navigator.clipboard.writeText(code).then(function(){ alert('已复制：' + code) }); }
      else { var i = document.createElement('input'); i.value = code; document.body.appendChild(i); i.select(); document.execCommand('copy'); document.body.removeChild(i); alert('已复制：' + code); }
    }
  </script>
